name: Intelligence refresh — scan

# Weekly: check figures that are due, draft proposals, and email you Approve/Reject
# buttons. Nothing is published here — approval happens in the email.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'        # Mondays ~08:00 Berlin

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan due figures + email proposals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.INTEL_FROM }}
          INTEL_REVIEWER_EMAIL: ${{ secrets.INTEL_REVIEWER_EMAIL }}
          INTEL_SIGNING_SECRET: ${{ secrets.INTEL_SIGNING_SECRET }}
          INTEL_WORKER_URL: ${{ vars.INTEL_WORKER_URL }}
        run: node automation/intelligence-refresh.mjs --scan --date=$(date +%F)

      - name: Commit proposals + lastChecked (if any)
        run: |
          git config user.name "Sqwod Bot"
          git config user.email "bot@sqwod.life"
          git add automation/intel-queue automation/intel-sources.json
          if git diff --staged --quiet; then
            echo "No proposals this scan."
          else
            git commit -m "intel: scan $(date +%F)"
            git pull --rebase --autostash origin main || true
            git push
          fi
