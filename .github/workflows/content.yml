name: Generate content (Sqwod cascade)

on:
  workflow_dispatch:            # manual run from the Actions tab
  schedule:
    - cron: '0 5 * * 1-5'        # ~06:00–07:00 Berlin, weekdays — self-publishing Daily

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ingest today's industry news (free, no key)
        id: ingest
        run: node automation/ingest.mjs

      - name: Rewrite in Sqwod voice (EN + DE)
        id: cascade
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node automation/cascade.mjs --date=$(date +%F) --status=published   # auto-publish; guardrail repairs/drops unverifiable items, then publishes — no human review

      - name: Voice it — TTS audio + podcast feeds (EN + DE)
        id: audio
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # Voice ids are version-controlled in automation/audio.mjs (authoritative);
          # we no longer inject the VOICE_EN/DE secrets so the id logs unmasked.
        run: node automation/audio.mjs --date=$(date +%F)

      - name: Render the email (EN + DE, with sponsor slot)
        id: newsletter
        run: node automation/newsletter.mjs --date=$(date +%F)

      - name: Commit & push (if anything changed)
        id: commit
        run: |
          git config user.name "Sqwod Bot"
          git config user.email "bot@sqwod.life"
          # Only stage paths that actually exist — a missing optional folder
          # (e.g. automation/moves before any move is submitted) must never
          # fail the whole Daily with a git pathspec error (exit 128).
          for p in site/src/content automation/sources automation/covered-ledger.json automation/moves site/public/audio site/public/podcast.xml site/public/podcast.de.xml site/public/email site/public/email-assets site/public/daily-en.xml site/public/daily-de.xml; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --staged --quiet; then
            echo "No content changes."
          else
            git commit -m "content: Sqwod Daily $(date +%F)"
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Send the Daily (Resend Broadcasts API)
        id: send
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_EN: ${{ secrets.RESEND_AUDIENCE_EN }}
          RESEND_AUDIENCE_DE: ${{ secrets.RESEND_AUDIENCE_DE }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          RESEND_REPLY_TO: ${{ vars.RESEND_REPLY_TO }}
          RESEND_PRIMARY_LANG: ${{ vars.RESEND_PRIMARY_LANG }}
        run: node automation/send.mjs --date=$(date +%F)

      - name: Heartbeat — confirm today actually shipped
        if: always()
        run: |
          D=$(date +%F)
          EN="site/src/content/daily/$D.en.md"
          if [ ! -f "$EN" ]; then
            echo "::error title=Sqwod Daily::No issue generated for $D (ingest empty or cascade failed). Nothing shipped."
            exit 0
          fi
          ST=$(grep -m1 '^status:' "$EN" | cut -d '"' -f2)
          if [ -f "site/public/audio/$D-en.mp3" ]; then AU="audio OK"; else AU="NO AUDIO"; fi
          if [ "$ST" != "published" ]; then
            echo "::warning title=Sqwod Daily::Issue for $D is status=$ST (held by verification) — not live until promoted. $AU"
          else
            echo "Sqwod Daily $D shipped: status=$ST · $AU"
          fi

      - name: Report which step failed (named alert)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
        run: |
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if   [ "${{ steps.ingest.outcome }}"     = "failure" ]; then F="Ingest news (feeds down / network)";
          elif [ "${{ steps.cascade.outcome }}"    = "failure" ]; then F="Rewrite in Sqwod voice — cascade (check ANTHROPIC_API_KEY credit/validity)";
          elif [ "${{ steps.audio.outcome }}"      = "failure" ]; then F="Audio / TTS (check ELEVENLABS_API_KEY credit/validity)";
          elif [ "${{ steps.newsletter.outcome }}" = "failure" ]; then F="Render email (newsletter.mjs)";
          elif [ "${{ steps.commit.outcome }}"     = "failure" ]; then F="Commit & push (git)";
          elif [ "${{ steps.send.outcome }}"       = "failure" ]; then F="Send the Daily (check RESEND_API_KEY / audience IDs)";
          else F="Setup / checkout"; fi
          {
            echo "## ❌ Sqwod Daily failed"
            echo ""
            echo "**Failed step:** $F"
            echo ""
            echo "[Open the run and expand the red step]($URL)"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=Sqwod Daily failed at: $F::$URL"
          # Optional push alert via Resend (guarded — never fails the reporter)
          if [ -n "$RESEND_API_KEY" ] && [ -n "$RESEND_FROM" ]; then
            curl -s -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" \
              -d "{\"from\":\"$RESEND_FROM\",\"to\":\"tee@teemajor.com\",\"subject\":\"❌ Sqwod Daily failed: $F\",\"text\":\"The Daily workflow failed at step: $F\n\nOpen the run: $URL\"}" >/dev/null || true
          fi
