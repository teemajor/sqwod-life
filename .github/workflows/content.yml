name: Generate content (Sqwod cascade)

on:
  workflow_dispatch:            # manual run from the Actions tab
  schedule:
    - cron: '0 5 * * 1-5'        # ~06:00–07:00 Berlin, weekdays — self-publishing Daily

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ingest today's industry news (free, no key)
        run: node automation/ingest.mjs

      - name: Rewrite in Sqwod voice (EN + DE)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node automation/cascade.mjs --date=$(date +%F) --status=published   # auto-publish; guardrail repairs/drops unverifiable items, then publishes — no human review

      - name: Voice it — TTS audio + podcast feeds (EN + DE)
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_EN: ${{ secrets.ELEVENLABS_VOICE_EN }}
          ELEVENLABS_VOICE_DE: ${{ secrets.ELEVENLABS_VOICE_DE }}
        run: node automation/audio.mjs --date=$(date +%F)

      - name: Render the email (EN + DE, with sponsor slot)
        run: node automation/newsletter.mjs --date=$(date +%F)

      - name: Commit & push (if anything changed)
        run: |
          git config user.name "Sqwod Bot"
          git config user.email "bot@sqwod.life"
          git add site/src/content automation/sources site/public/audio site/public/podcast.xml site/public/podcast.de.xml site/public/email site/public/email-assets site/public/daily-en.xml site/public/daily-de.xml
          if git diff --staged --quiet; then
            echo "No content changes."
          else
            git commit -m "content: Sqwod Daily $(date +%F)"
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Send the Daily (Resend Broadcasts API)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_EN: ${{ secrets.RESEND_AUDIENCE_EN }}
          RESEND_AUDIENCE_DE: ${{ secrets.RESEND_AUDIENCE_DE }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          RESEND_REPLY_TO: ${{ vars.RESEND_REPLY_TO }}
          RESEND_PRIMARY_LANG: ${{ vars.RESEND_PRIMARY_LANG }}
        run: node automation/send.mjs --date=$(date +%F)

      - name: Heartbeat — confirm today actually shipped
        if: always()
        run: |
          D=$(date +%F)
          EN="site/src/content/daily/$D.en.md"
          if [ ! -f "$EN" ]; then
            echo "::error title=Sqwod Daily::No issue generated for $D (ingest empty or cascade failed). Nothing shipped."
            exit 0
          fi
          ST=$(grep -m1 '^status:' "$EN" | cut -d '"' -f2)
          if [ -f "site/public/audio/$D-en.mp3" ]; then AU="audio OK"; else AU="NO AUDIO"; fi
          if [ "$ST" != "published" ]; then
            echo "::warning title=Sqwod Daily::Issue for $D is status=$ST (held by verification) — not live until promoted. $AU"
          else
            echo "Sqwod Daily $D shipped: status=$ST · $AU"
          fi
